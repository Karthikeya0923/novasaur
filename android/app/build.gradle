plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.novasaur'
    compileSdk 35

    defaultConfig {
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

kotlinOptions {
    jvmTarget = '17'
}
}

dependencies {
    implementation 'androidx.core:core-ktx:1.15.0'
    // Pinned to the exact version the DinoSpace binding packages
    // (AndroidMavenLibrary 0.13.1) so compile-time and runtime APIs match.
    implementation("com.google.ai.edge.litertlm:litertlm-android:0.13.1")
}